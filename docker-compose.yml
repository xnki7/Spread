services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: spread-timescaledb
    environment:
      POSTGRES_USER: spread
      POSTGRES_PASSWORD: spread_dev
      POSTGRES_DB: spread
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spread -d spread"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: spread-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  timescale_data:
  redis_data:
